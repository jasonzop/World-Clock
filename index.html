<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Poppins", sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at top left, rgba(38, 88, 130, 0.28), transparent 34%),
        radial-gradient(circle at bottom right, rgba(35, 75, 112, 0.18), transparent 34%),
        #020b14;
      padding: 40px 36px;
    }

    .page {
      max-width: 1380px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: clamp(38px, 5vw, 72px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow: 0 7px 22px rgba(0, 0, 0, 0.5);
    }

    .subtitle {
      margin-top: 12px;
      color: #9fb0c5;
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 500;
    }

    .search-wrap {
      max-width: 520px;
      margin: 26px auto 34px;
    }

    #searchInput {
      width: 100%;
      height: 56px;
      padding: 0 22px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(9, 21, 35, 0.82);
      color: #f8fafc;
      font-family: "Poppins", sans-serif;
      font-size: 17px;
      font-weight: 500;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 12px 34px rgba(0, 0, 0, 0.35);
    }

    #searchInput::placeholder {
      color: #7f8ea3;
    }

    .clock-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .clock-card {
      min-height: 308px;
      padding: 38px 30px;
      border-radius: 18px;
      border: 1px solid rgba(120, 150, 182, 0.28);
      background:
        linear-gradient(145deg, rgba(16, 34, 54, 0.95), rgba(8, 20, 34, 0.96)),
        rgba(10, 25, 41, 0.95);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        inset 0 -1px 0 rgba(255, 255, 255, 0.02),
        0 18px 38px rgba(0, 0, 0, 0.24);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .clock-card:hover {
      transform: translateY(-5px);
      border-color: rgba(170, 198, 230, 0.45);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.34);
    }

    .location {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: clamp(25px, 2.4vw, 36px);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.15;
      color: #ffffff;
      text-shadow: 0 3px 9px rgba(0, 0, 0, 0.6);
    }

    .flag {
      font-size: 40px;
      line-height: 1;
      filter: drop-shadow(0 4px 5px rgba(0, 0, 0, 0.35));
    }

    .time {
      margin-top: 22px;
      font-size: clamp(58px, 6.2vw, 88px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -4px;
      color: #f9fafb;
      text-shadow: 0 5px 14px rgba(0, 0, 0, 0.55);
    }

    .date {
      margin-top: 8px;
      font-size: clamp(22px, 2.2vw, 31px);
      font-weight: 500;
      color: #93a4ba;
      line-height: 1.2;
    }

    .hidden {
      display: none;
    }

    .empty-message {
      display: none;
      text-align: center;
      color: #94a3b8;
      font-size: 20px;
      margin-top: 40px;
    }

    @media (max-width: 1100px) {
      .clock-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 30px 18px;
      }

      .clock-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .clock-card {
        min-height: 260px;
      }
    }

    @media (max-width: 560px) {
      .clock-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>World Clock</h1>
      <p class="subtitle">Current time around the world</p>

      <div class="search-wrap">
        <input id="searchInput" type="text" placeholder="Search cities" aria-label="Search cities" />
      </div>
    </header>

    <section class="clock-grid" id="clockGrid"></section>
    <p class="empty-message" id="emptyMessage">No cities found.</p>
  </main>

  <script>
    const cities = [
      { location: "New York", flag: "🇺🇸", timeZone: "America/New_York" },
      { location: "London", flag: "🇬🇧", timeZone: "Europe/London" },
      { location: "Tokyo", flag: "🇯🇵", timeZone: "Asia/Tokyo" },
      { location: "Sydney", flag: "🇦🇺", timeZone: "Australia/Sydney" },
      { location: "UTC", flag: "🌎", timeZone: "UTC" },
      { location: "Paris", flag: "🇫🇷", timeZone: "Europe/Paris" },
      { location: "Dubai", flag: "🇦🇪", timeZone: "Asia/Dubai" },
      { location: "Singapore", flag: "🇸🇬", timeZone: "Asia/Singapore" },
      { location: "LA", flag: "🇺🇸", timeZone: "America/Los_Angeles" },
      { location: "Sao Paulo", flag: "🇧🇷", timeZone: "America/Sao_Paulo" },
      { location: "Mumbai", flag: "🇮🇳", timeZone: "Asia/Kolkata" },
      { location: "Seoul", flag: "🇰🇷", timeZone: "Asia/Seoul" }
    ];

    const clockGrid = document.getElementById("clockGrid");
    const searchInput = document.getElementById("searchInput");
    const emptyMessage = document.getElementById("emptyMessage");

    function createCards() {
      clockGrid.innerHTML = "";

      cities.forEach((city) => {
        const card = document.createElement("article");
        card.className = "clock-card";
        card.dataset.location = city.location.toLowerCase();
        card.dataset.timeZone = city.timeZone;

        card.innerHTML = `
          <div class="location">
            <span class="flag">${city.flag}</span>
            <span>${city.location}</span>
          </div>
          <div class="time"></div>
          <div class="date"></div>
        `;

        clockGrid.appendChild(card);
      });
    }

    function updateClocks() {
      const cards = document.querySelectorAll(".clock-card");

      cards.forEach((card) => {
        const timeZone = card.dataset.timeZone;
        const now = new Date();

        const time = new Intl.DateTimeFormat("en-US", {
          timeZone,
          hour: "2-digit",
          minute: "2-digit",
          hourCycle: "h23"
        }).format(now);

        const date = new Intl.DateTimeFormat("en-GB", {
          timeZone,
          day: "2-digit",
          month: "long",
          year: "numeric"
        }).format(now);

        card.querySelector(".time").textContent = time;
        card.querySelector(".date").textContent = date;
      });
    }

    function filterCards() {
      const searchText = searchInput.value.toLowerCase().trim();
      const cards = document.querySelectorAll(".clock-card");
      let visibleCards = 0;

      cards.forEach((card) => {
        const matches = card.dataset.location.includes(searchText);
        card.classList.toggle("hidden", !matches);
        if (matches) visibleCards++;
      });

      emptyMessage.style.display = visibleCards === 0 ? "block" : "none";
    }

    createCards();
    updateClocks();
    setInterval(updateClocks, 1000);
    searchInput.addEventListener("input", filterCards);
  </script>
</body>
</html>
